<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Dashed orbit circle -->
  <circle cx="50" cy="50" r="35" stroke="#00DC82" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>
  <!-- Connector lines -->
  <line x1="50" y1="15" x2="50" y2="35" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="65" x2="50" y2="85" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="15" y1="50" x2="35" y2="50" stroke="white" stroke-width="1" opacity="0.4"/>
  <line x1="65" y1="50" x2="85" y2="50" stroke="white" stroke-width="1" opacity="0.4"/>
  <!-- Center circle -->
  <circle cx="50" cy="50" r="18" fill="url(#g1)"/>
  <circle cx="50" cy="50" r="15" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- AF text -->
  <text x="50" y="55" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-weight="700" font-size="11">AF</text>
  <!-- Nodes: top=green, left=green, right=blue, bottom=purple -->
  <circle cx="50" cy="15" r="6" fill="#00DC82"/>
  <circle cx="50" cy="15" r="2" fill="white"/>
  <circle cx="15" cy="50" r="6" fill="#00DC82"/>
  <circle cx="15" cy="50" r="2" fill="white"/>
  <circle cx="85" cy="50" r="6" fill="#3B9EFF"/>
  <circle cx="85" cy="50" r="2" fill="white"/>
  <circle cx="50" cy="85" r="6" fill="#A855F7"/>
  <circle cx="50" cy="85" r="2" fill="white"/>
  <defs>
    <radialGradient id="g1" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#00DC82"/>
      <stop offset="100%" stop-color="#00897B"/>
    </radialGradient>
  </defs>
</svg>
